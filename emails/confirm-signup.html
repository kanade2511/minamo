<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="margin: 0; padding: 0; background-color: #f8f7f6; font-family: 'Hiragino Sans', 'Noto Sans JP', 'Yu Gothic', sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #f8f7f6; padding: 40px 0;">
    <tr>
      <td align="center">
        <table width="480" cellpadding="0" cellspacing="0" style="background-color: #ffffff; border-radius: 16px; overflow: hidden;">
          <!-- Header -->
          <tr>
            <td style="padding: 48px 48px 0 48px;">
              <p style="margin: 0; font-size: 20px; font-weight: 600; letter-spacing: -0.3px; color: #17171c;">Minamo</p>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding: 32px 48px 0 48px;">
              <p style="margin: 0; font-size: 14px; line-height: 1.8; color: #17171c;">
                Minamo にご登録いただき、ありがとうございます。<br>
                以下のボタンをクリックして、メールアドレスの確認を完了してください。
              </p>
            </td>
          </tr>
          <!-- Button -->
          <tr>
            <td style="padding: 32px 48px 0 48px;">
              <table cellpadding="0" cellspacing="0">
                <tr>
                  <td style="background-color: #17171c; border-radius: 32px; padding: 12px 32px;">
                    <a href="{{ .ConfirmationURL }}" style="color: #ffffff; text-decoration: none; font-size: 13px; letter-spacing: 0.03em; display: inline-block;">メールアドレスを確認する</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <!-- Note -->
          <tr>
            <td style="padding: 24px 48px 0 48px;">
              <p style="margin: 0; font-size: 12px; line-height: 1.7; color: #93939f;">
                このリンクは24時間有効です。<br>
                もしこのメールに心当たりがない場合は、お手数ですが破棄していただきますようお願いいたします。
              </p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="padding: 40px 48px 48px 48px;">
              <p style="margin: 0; font-size: 11px; color: #b0b0b8; line-height: 1.6;">
                自分を知る、毎日少しずつ。
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
